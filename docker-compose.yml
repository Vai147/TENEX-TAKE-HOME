services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tenex
      POSTGRES_PASSWORD: tenex
      POSTGRES_DB: tenex
    ports:
      # host 5433 avoids a clash with a local Postgres on 5432; the backend still
      # reaches the DB via the internal `db:5432` service address.
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenex"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tenex:tenex@db:5432/tenex
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      FRONTEND_ORIGIN: http://localhost:3000
      UPLOAD_DIR: /data/uploads
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/data/uploads

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  db_data:
  upload_data:
